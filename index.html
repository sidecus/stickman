<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>想想的火柴人战争</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="title-bar">
        <div>
          <p class="eyebrow">游戏设计与指导：雷神队8号-想想同学</p>
          <h1>想想的火柴人战争</h1>
        </div>
        <p class="subtitle">
          蓝队对红队。建立压力，控制战场，摧毁基地。
        </p>
      </section>

      <section class="game-shell">
        <div class="map-column">
          <div class="hud-row">
            <div class="hud-card" id="redStatus"></div>
            <div class="hud-card hud-card-center" id="centerStatus"></div>
            <div class="hud-card" id="blueStatus"></div>
          </div>

          <div class="battle-stage">
            <div class="canvas-frame">
              <div class="time-display" id="timeDisplay"></div>
              <canvas
                id="gameCanvas"
                width="1280"
                height="720"
                aria-label="火柴人战场"
              ></canvas>
              <div class="message-banner" id="messageBanner">
                点击一路的部署栏即可出兵。首次操作也会同时开启声音。
              </div>
            </div>
            <div class="deployment-hud" id="deploymentHud"></div>
          </div>
        </div>

        <aside class="side-panel" id="sidePanel">
          <div class="side-panel-header">
            <p class="eyebrow">兵种</p>
            <button
              class="side-panel-close"
              id="unitGuideClose"
              type="button"
              aria-label="收起兵种面板"
            >
              收起
            </button>
          </div>
          <div class="unit-guide" id="unitGuide"></div>
        </aside>
        <button
          class="unit-guide-toggle"
          id="unitGuideToggle"
          type="button"
          aria-controls="sidePanel"
          aria-expanded="false"
        >
          兵种
        </button>
        <button
          class="side-panel-backdrop"
          id="sidePanelBackdrop"
          type="button"
          aria-label="关闭兵种面板"
        ></button>
      </section>
    </main>

    <section class="overlay hidden" id="overlay">
      <div class="overlay-card">
        <h2 id="overlayTitle"></h2>
        <p class="overlay-subtitle" id="overlaySubtitle"></p>
        <div class="summary-grid" id="summaryGrid"></div>
        <button class="restart-button" id="restartButton">重新开始比赛</button>
      </div>
    </section>

    <div class="rotate-hint" id="rotateHint" aria-live="polite">
      建议切换到横屏模式游玩
    </div>

    <script type="module" src="game.js"></script>
  </body>
</html>
