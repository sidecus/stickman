<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>想想的火柴人战争</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="title-bar">
        <div>
          <p class="eyebrow">游戏设计与指导：想想</p>
          <h1>想想的火柴人战争</h1>
        </div>
        <p class="subtitle">
          蓝队对红队。建立压力，控制战场，摧毁基地。
        </p>
      </section>

      <section class="game-shell">
        <div class="map-column">
          <div class="hud-row">
            <div class="hud-card" id="redStatus"></div>
            <div class="hud-card hud-card-center" id="centerStatus"></div>
            <div class="hud-card" id="blueStatus"></div>
          </div>

          <div class="canvas-frame">
            <canvas
              id="gameCanvas"
              width="1280"
              height="720"
              aria-label="火柴人战场"
            ></canvas>
            <div class="deployment-hud" id="deploymentHud"></div>
            <div class="message-banner" id="messageBanner">
              点击一路的部署栏即可出兵。首次操作也会同时开启声音。
            </div>
          </div>
        </div>

        <aside class="side-panel">
          <p class="eyebrow">兵种</p>
          <div class="unit-guide" id="unitGuide"></div>
        </aside>
      </section>
    </main>

    <section class="overlay hidden" id="overlay">
      <div class="overlay-card">
        <p class="eyebrow">战报</p>
        <h2 id="overlayTitle"></h2>
        <p class="overlay-subtitle" id="overlaySubtitle"></p>
        <div class="summary-grid" id="summaryGrid"></div>
        <button class="restart-button" id="restartButton">重新开始比赛</button>
      </div>
    </section>

    <script type="module" src="game.js"></script>
  </body>
</html>
