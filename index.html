<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>想想的火柴人战争</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="title-bar">
        <div>
          <p class="eyebrow">可玩原型</p>
          <h1>想想的火柴人战争</h1>
        </div>
        <p class="subtitle">
          蓝队对红队。建立压力，控制战场，摧毁基地。
        </p>
      </section>

      <section class="game-shell">
        <div class="hud-row">
          <div class="hud-card" id="redStatus"></div>
          <div class="hud-card hud-card-center" id="centerStatus"></div>
          <div class="hud-card" id="blueStatus"></div>
        </div>

        <div class="battle-layout">
          <div class="canvas-frame">
            <canvas
              id="gameCanvas"
              width="1280"
              height="720"
              aria-label="Stickman battle arena"
            ></canvas>
            <div class="message-banner" id="messageBanner">
              点击单位卡片或按 1-4 部署。首次输入也会解锁声音。
            </div>
          </div>

          <aside class="side-panel">
            <p class="eyebrow">招募</p>
            <div class="unit-panel" id="unitPanel"></div>
          </aside>
        </div>
      </section>
    </main>

    <section class="overlay hidden" id="overlay">
      <div class="overlay-card">
        <p class="eyebrow">战报</p>
        <h2 id="overlayTitle"></h2>
        <p class="overlay-subtitle" id="overlaySubtitle"></p>
        <div class="summary-grid" id="summaryGrid"></div>
        <button class="restart-button" id="restartButton">重新开始比赛</button>
      </div>
    </section>

    <script type="module" src="game.js"></script>
  </body>
</html>
